<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>About Me - My Website</title>
</head>
<body>
    <h1>About Me</h1>
    <p>I am a freshman at the University of Maryland - College Park. I'm studying computer science and planning on specializing in machine learning.</p>
    <button onclick="window.location.href='index.html'">Home</button>
    <button class="DarkMode" onclick="toggleDark()">Dark Mode</button>
    <script>
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme === "dark") {
            document.body.classList.add("dark");
            document.querySelector(".DarkMode").textContent = "Light Mode";
        }

        function toggleDark() {
            document.body.classList.toggle("dark");
            const isDark = document.body.classList.contains("dark");
            localStorage.setItem("theme", isDark ? "dark" : "light");
            const btn = document.querySelector(".DarkMode");
            btn.textContent = document.body.classList.contains("dark") ? "Light Mode" : "Dark Mode";
        }
    </script>
</body>
</html>
