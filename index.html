<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rishab Iyer</title>
</head>
<body>
    <h1>Rishab Iyer</h1>
    <p>riyer129@terpmail.umd.edu</p>
    <button onclick="window.location.href='about.html'">About Me</button>
    <button onclick="window.location.href='socials.html'">Socials</button>
    <button class="DarkMode" onclick="toggleDark()">Dark Mode</button>
    <script>
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme === "dark") {
            document.body.classList.add("dark");
            document.querySelector(".DarkMode").textContent = "Light Mode";
        }

        function toggleDark() {
            document.body.classList.toggle("dark");
            const isDark = document.body.classList.contains("dark");
            localStorage.setItem("theme", isDark ? "dark" : "light");
            const btn = document.querySelector(".DarkMode");
            btn.textContent = document.body.classList.contains("dark") ? "Light Mode" : "Dark Mode";
        }
    </script>
</body>
</html>
