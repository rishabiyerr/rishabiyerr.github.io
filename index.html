<!DOCTYPE html>
<html>
<head>
    <style id = "Light Mode">
        body {background-color: white;}
        h1 {
            color: black;
            font-family: verdana;
            font-size: 300%;
        }
        p {
            color: black;
            font-family: verdana;
            font-size: 300%;
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Title</title>
</head>
<body>
    <h1>Rishab Iyer</h1>
    <p>riyer129@terpmail.umd.edu</p>
    <button onclick="window.location.href='about.html'">About Me</button>
    <button onclick="window.location.href='socials.html'">Socials</button>
    <button onclick="toggleStyle()">Switch Style</button>
    <script>
        let styleOne = true;
        function toggleStyle() {
        const h1 = document.querySelector('h1');
        const p = document.querySelector('p');
            if (styleOne) {
                document.body.style.backgroundColor = 'black';
                h1.style.color = 'white';
                h1.style.fontFamily = 'verdana';
                h1.style.fontSize = '300%';
                p.style.color = 'white';
                p.style.fontFamily = 'verdana';
            } else {
                document.body.style.backgroundColor = 'white';
                h1.style.color = 'black';
                h1.style.fontFamily = 'verdana';
                h1.style.fontSize = '300%';
                p.style.color = 'black';
                p.style.fontFamily = 'verdana';
            }
            styleOne = !styleOne;
        }
    </script>
</body>
</html>
