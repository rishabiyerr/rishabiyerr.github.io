<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <title>Socials - Rishab Iyer</title>
</head>
<body>
    <h1>Socials</h1>
    <p>Linked here are my GitHub and LinkdIn profiles</p>
    <button onclick="window.open('https://github.com/rishabiyerr', '_blank')">GitHub</button>
    <button onclick="window.open('https://www.linkedin.com/in/rishab-i/', '_blank')">LinkedIn</button>
    <button onclick="window.location.href='index.html'">Home</button>
    <button class="DarkMode" onclick="toggleDark()">Dark Mode</button>
    <script>
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme === "dark") {
            document.body.classList.add("dark");
            document.querySelector(".DarkMode").textContent = "Light Mode";
        }

        function toggleDark() {
            document.body.classList.toggle("dark");
            const isDark = document.body.classList.contains("dark");
            localStorage.setItem("theme", isDark ? "dark" : "light");
            const btn = document.querySelector(".DarkMode");
            btn.textContent = document.body.classList.contains("dark") ? "Light Mode" : "Dark Mode";
        }
    </script>
</body>
</html>
